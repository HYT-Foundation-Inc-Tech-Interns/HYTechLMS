# Auto-deploy to Firebase Hosting on push to main
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
    paths:
      - 'lms-app/**'
      - '.github/workflows/firebase-hosting-merge.yml'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'lms-app/package-lock.json'
      
      - name: Install & Build
        working-directory: ./lms-app
        run: npm ci && npm run build
      
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HYTECH_AD360 }}
          channelId: live
          projectId: hytech-ad360
