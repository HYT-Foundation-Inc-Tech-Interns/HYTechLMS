name: Deploy Firebase

# Every push to main deploys all resources declared in HYTech/firebase.json:
# Hosting, Firestore rules/indexes, Storage rules, and Cloud Functions.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: HYTech

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            HYTech/package-lock.json
            HYTech/functions/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Build frontend
        # Firebase web identifiers and the reCAPTCHA site key are public values
        # embedded in the browser bundle. Keep FIREBASE_TOKEN in GitHub Secrets.
        env:
          VITE_FIREBASE_API_KEY: AIzaSyANfQhkxPSlkoWT5s1IayCZrK5v8GTm6-M
          VITE_FIREBASE_AUTH_DOMAIN: hyt-global-institute-lms.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: hyt-global-institute-lms
          VITE_FIREBASE_STORAGE_BUCKET: hyt-global-institute-lms.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "671829419730"
          VITE_FIREBASE_APP_ID: "1:671829419730:web:705e9bcc9e8c32df562f0b"
          VITE_RECAPTCHA_SITE_KEY: ${{ vars.VITE_RECAPTCHA_SITE_KEY }}
        run: npm run build

      - name: Validate Firebase deployment
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: >-
          npx --yes firebase-tools@15.24.0 deploy
          --project hyt-global-institute-lms
          --dry-run
          --non-interactive

      # Function builds leave container images in Artifact Registry. Configure
      # this policy explicitly so the deploy never stops for an interactive
      # cleanup prompt and old images do not accumulate storage charges.
      - name: Configure Functions artifact cleanup
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: >-
          npx --yes firebase-tools@15.24.0 functions:artifacts:setpolicy
          --project hyt-global-institute-lms
          --location asia-southeast1
          --days 1
          --force

      - name: Deploy all configured Firebase resources
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: >-
          npx --yes firebase-tools@15.24.0 deploy
          --project hyt-global-institute-lms
          --non-interactive
